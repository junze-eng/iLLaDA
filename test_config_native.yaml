# Unified native config for iLLaDA / W1 experiments.
# This config is intended for native_model.py + native_output.py, not run_model.py.
#
# Recommended context-double workflow:
#   python native_model.py --config test_config_native.yaml --only context_double_8k_tps_iLLaDA --models iLLaDA --output-root outputs/context_double/model_outputs --auto-prepare --force
#   python native_output.py --config test_config_native.yaml --only context_double_8k_tps_iLLaDA --models iLLaDA --model-output-root outputs/context_double/model_outputs --output-root outputs/context_double/native_outputs
#
# Recommended MBPP long-generation workflow:
#   python native_model.py --config test_config_native.yaml --only mbpp_s6_l1024 --models iLLaDA --output-root outputs/context_double/model_outputs --auto-prepare --force
#   python native_output.py --config test_config_native.yaml --only mbpp_s6_l1024 --models iLLaDA --model-output-root outputs/context_double/model_outputs --output-root outputs/context_double/native_outputs
#
# Output layout with patched native_model.py/native_output.py:
#   outputs/context_double/model_outputs/<model>/<task_alias>/<benchmark>/<condition>/
#   outputs/context_double/model_outputs/<model>/native_model_manifest.{jsonl,csv}
#   outputs/context_double/native_outputs/<model>/<task_alias>/<benchmark>/<condition>/
#   outputs/context_double/native_outputs/<model>/native_output_manifest.{jsonl,csv}

run:
  tasks:
    - context_double_8k_tps

execution:
  gpu_telemetry:
    enabled: true
    interval_seconds: 5

data:
  prepared_dir: data/prepared
  ruler_haystack_path: data/ruler/paul_graham_essay.jsonl

models:
  - name: iLLaDA
    backend: illada
    type: instruct
    abbr: iLLaDA
    path: GSAI-ML/iLLaDA-8B-Instruct
    mask_id: 5
    apply_chat_template: true
    gpu_telemetry: true
    gpu_telemetry_interval: 5
    model_kwargs:
      device_map: auto
      torch_dtype: torch.bfloat16

  # Optional W1 local backend. It is not run unless --models w1_4b or a W1 task is selected.
  - name: w1_4b
    backend: w1_4b
    repo_path: ${W1_4B_REPO:-W1-4B-dLLM-Base}
    checkpoint: whale3.7Bdiffusion.safetensors
    config: configs/whale3b.yaml
    tokenizer_path: whale-tokenizer
    sampler: gidd
    device: cuda
    dtype: bf16
    max_seq_len: 4096
    gpu_telemetry: true
    gpu_telemetry_interval: 5
    temperature: 0.0
    top_k: 0
    use_ema: true
    seed: 1234

defaults:
  sample_limit: null
  sample_indices: null
  num_samples: null
  gen_length: 128
  gen_steps: 128
  gen_blocksize: 32
  max_new_tokens: null
  max_seq_len: 8192
  temperature: 0.0
  cfg: 0.0
  remasking: low_confidence
  mask_id: 5
  token_selection_confidence_threshold: null
  min_transfer_tokens: 1
  diff_confidence_eos_eot_inf: true
  diff_logits_eos_inf: false
  return_trace: false
  trace_token_snapshots: false
  trace_decode_snapshots: false

tasks:
  # Your preferred task directory name is preserved:
  #   <output-root>/iLLaDA/mbpp_s6_l1024/mbpp/s6_l1024_b32_st1024...
  mbpp_s6_l1024:
    description: "iLLaDA native MBPP sample 6 long-generation trace, len=1024, block=32."
    experiments:
      - name: mbpp_s6_l1024
        output_task: mbpp_s6_l1024
        benchmark: mbpp
        models: [iLLaDA]
        params:
          sample_indices: [6]
          gen_length: 1024
          gen_blocksize: 32
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [1024, 512, 256]
          token_selection_confidence_threshold: [null, 0.6, 0.8]

  # Context double main test. Use --output-root outputs/context_double/model_outputs.
  # Result path:
  #   outputs/context_double/model_outputs/iLLaDA/context_double_8k_tps/ruler_niah_double_2/<condition>/
  context_double_8k_tps:
    description: "iLLaDA native 8k double-needle ordered retrieval, 3 needle pairs x 3 planned TPS."
    experiments:
      - name: context_double_8k_tps_iLLaDA
        output_task: context_double_8k_tps
        benchmark: ruler_niah_double_2
        models: [iLLaDA]
        params:
          num_samples: 10
          gen_length: 64
          gen_blocksize: 32
          max_seq_len: 8192
          min_transfer_tokens: 1
          return_trace: false
          seed: 42
        sweep:
          context_length: [8192]
          needle_pair: [front_middle, front_back, middle_back]
          gen_steps: [128, 64, 32]

  # Optional one-sample context trace probe. It is separate from the main context score run.
  context_double_trace_probe:
    description: "Single-sample trace probe for iLLaDA double-needle context; use only for mechanism visualization."
    experiments:
      - name: context_double_trace_probe_iLLaDA
        output_task: context_double_trace_probe
        benchmark: ruler_niah_double_2
        models: [iLLaDA]
        params:
          num_samples: 1
          gen_length: 64
          gen_blocksize: 32
          max_seq_len: 8192
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
          seed: 42
        sweep:
          context_length: [8192]
          needle_pair: [front_back]
          gen_steps: [128, 64, 32]

  # Optional W1 context comparison within W1's 4096-token context limit.
  context_double_w1_2_4k:
    description: "W1-4B double-needle retrieval within 2K/4K context, 3 needle pairs x 1/2/4 planned tokens per step."
    experiments:
      - name: context_double_w1_2_4k_parallel
        output_task: context_double_w1_2_4k
        benchmark: ruler_niah_double_2
        models: [w1_4b]
        params:
          num_samples: 20
          gen_length: 64
          max_new_tokens: 64
          max_seq_len: 4096
          temperature: 0.0
          return_trace: false
          seed: 42
        sweep:
          context_length: [2048, 4096]
          needle_pair: [front_middle, front_back, middle_back]
          w1_sampler: [gidd]
          w1_steps: [64, 32, 16]

  # Optional W1 trace probes.
  w1_trace_focus:
    description: "W1-4B trace probes for generation order, sampler dynamics, and parallel decoding behavior."
    experiments:
      - name: w1_trace_gsm8k_sample7
        output_task: w1_trace_focus
        benchmark: gsm8k
        models: [w1_4b]
        params:
          sample_indices: [7]
          gen_length: 256
          max_new_tokens: 256
          temperature: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
          seed: 42
        sweep:
          w1_sampler: [standard, gidd, jump]
          w1_steps: [64, 32, 16]

      - name: w1_trace_context_double_sample0
        output_task: w1_trace_focus
        benchmark: ruler_niah_double_2
        models: [w1_4b]
        params:
          num_samples: 1
          gen_length: 64
          max_new_tokens: 64
          max_seq_len: 4096
          temperature: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
          seed: 42
        sweep:
          context_length: [2048, 4096]
          needle_pair: [front_back]
          w1_sampler: [standard, gidd, jump]
          w1_steps: [64, 32, 16]
