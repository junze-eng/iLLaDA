# Native side-channel config focused ONLY on WhaleTech W1-4B.
# iLLaDA has already been run; this config only runs the W1 conditions needed
# for long-context parallel retrieval and ARness / generation-order comparison.
#
# Workflow:
#   1) python prepare_data.py --config test_config_native.yaml --force
#   2) CUDA_VISIBLE_DEVICES=0 python native_model.py --config test_config_native.yaml --models w1_4b --auto-prepare
#   3) python native_output.py --config test_config_native.yaml --models w1_4b
#   4) python native_visual.py --root native_outputs --output-root visual --all
#
# Paths:
#   prepared data:   RULER only -> data/prepared/<ruler_benchmark>/<condition>.jsonl
#   model outputs:   model_outputs/<model>/<task>/<benchmark>/<condition>/
#   eval outputs:    native_outputs/<model>/<task>/<benchmark>/<condition>/

run:
  tasks:
    - native_context_order2_w1
    - native_w1_trace_focus

data:
  prepared_dir: data/prepared
  ruler_haystack_path: data/ruler/paul_graham_essay.jsonl

models:
  # Local Hugging Face W1-4B dLLM release.
  # Clone once before running:
  #   git clone https://huggingface.co/WhaletechAI/W1-4B-dLLM-Base /path/to/W1-4B-dLLM-Base
  #   pip install -r /path/to/W1-4B-dLLM-Base/requirements.txt
  # Then set repo_path below, or export W1_4B_REPO=/path/to/W1-4B-dLLM-Base.
  - name: w1_4b
    backend: w1_4b
    repo_path: ${W1_4B_REPO:-W1-4B-dLLM-Base}
    checkpoint: whale3.7Bdiffusion.safetensors
    config: configs/whale3b.yaml
    tokenizer_path: whale-tokenizer
    sampler: gidd
    device: cuda
    dtype: bf16
    max_seq_len: 4096
    gpu_telemetry: true
    gpu_telemetry_interval: 5
    temperature: 0.0
    top_k: 0
    use_ema: true
    seed: 1234

  # Optional legacy API wrapper, not used by default.
  - name: w1_api
    backend: openai_compatible
    model: whale-w1
    api_base: http://localhost:8000/v1
    api_key: EMPTY
    timeout: 600
    gpu_telemetry: false
    generation_params:
      top_p: 1.0
    api_param_map:
      w1_sampler: sampler
      w1_steps: steps
    extra_body: {}

defaults:
  sample_limit: null
  sample_indices: null
  num_samples: null
  gen_length: 128
  gen_steps: 128
  gen_blocksize: 128
  max_new_tokens: null
  max_seq_len: 4096
  temperature: 0.0
  cfg: 0.0
  remasking: low_confidence
  mask_id: 5
  token_selection_confidence_threshold: null
  min_transfer_tokens: 1
  diff_confidence_eos_eot_inf: true
  diff_logits_eos_inf: false
  return_trace: false
  trace_token_snapshots: false
  trace_decode_snapshots: false

# ---------------------------------------------------------------------------
# W1-only native experiments.
# Two groups are kept by default:
#   1) native_context_order2_w1: long-context double-needle retrieval at matched
#      planned parallelism levels, within W1's 4096-token context limit.
#   2) native_w1_trace_focus: trace probes for generation order and sampler behavior.
# ---------------------------------------------------------------------------
tasks:
  native_context_order2_w1:
    description: "W1-4B double-needle long-context retrieval within its 4096-token limit; 2K/4K x 3 needle pairs x 1/2/4 token-per-step."
    experiments:
      - name: native_context_order2_w1_2_4k_parallel
        benchmark: ruler_niah_double_2
        models: [w1_4b]
        params:
          num_samples: 20
          gen_length: 64
          max_new_tokens: 64
          max_seq_len: 4096
          temperature: 0.0
          return_trace: false
          seed: 42
        sweep:
          context_length: [2048, 4096]
          needle_pair: [front_middle, front_back, middle_back]
          w1_sampler: [gidd]
          w1_steps: [64, 32, 16]

  native_w1_trace_focus:
    description: "W1-4B trace probes for generation order, sampler dynamics, and parallel decoding behavior."
    experiments:
      - name: native_w1_trace_gsm8k_sample7
        benchmark: gsm8k
        models: [w1_4b]
        params:
          sample_indices: [7]
          gen_length: 256
          max_new_tokens: 256
          temperature: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
          seed: 42
        sweep:
          w1_sampler: [standard, gidd, jump]
          w1_steps: [64, 32, 16]

      - name: native_w1_trace_context_order2_sample0
        benchmark: ruler_niah_double_2
        models: [w1_4b]
        params:
          num_samples: 1
          gen_length: 64
          max_new_tokens: 64
          max_seq_len: 4096
          temperature: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
          seed: 42
        sweep:
          context_length: [2048, 4096]
          needle_pair: [front_back]
          w1_sampler: [standard, gidd, jump]
          w1_steps: [64, 32, 16]
