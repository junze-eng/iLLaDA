# Native side-channel config for efficient iLLaDA / WhaleTech W1 comparisons.
#
# Workflow:
#   1) python prepare_data.py --config test_config_native.yaml --only <task-or-experiment> --force
#   2) CUDA_VISIBLE_DEVICES=0 python native_output.py --config test_config_native.yaml --only <task-or-experiment> --models illada [w1_4b] --auto-prepare
#   3) python native_eval.py --config test_config_native.yaml --only <task-or-experiment> --models illada [w1_4b]
#   4) python native_plot_traces.py --root outputs/<task> --all
#
# Key idea: native_output.py loads each selected model ONCE, then runs all selected
# sweep conditions continuously. No OpenCompass CLI is used on this native path.

run:
  tasks: [native_w1_trace_focus]

data:
  prepared_dir: data/prepared
  ruler_haystack_path: data/ruler/paul_graham_essay.jsonl

models:
  - name: illada
    backend: illada
    type: instruct
    path: GSAI-ML/iLLaDA-8B-Instruct
    mask_id: 5
    apply_chat_template: true
    gpu_telemetry: true
    gpu_telemetry_interval: 5
    model_kwargs:
      device_map: auto
      torch_dtype: torch.bfloat16

  # Local Hugging Face W1-4B dLLM release.
  # Clone once before running:
  #   git clone https://huggingface.co/WhaletechAI/W1-4B-dLLM-Base /path/to/W1-4B-dLLM-Base
  #   pip install -r /path/to/W1-4B-dLLM-Base/requirements.txt
  # Then set repo_path below, or export W1_4B_REPO=/path/to/W1-4B-dLLM-Base.
  - name: w1_4b
    backend: w1_4b
    repo_path: ${W1_4B_REPO:-W1-4B-dLLM-Base}
    checkpoint: whale3.7Bdiffusion.safetensors
    config: configs/whale3b.yaml
    tokenizer_path: whale-tokenizer
    sampler: gidd
    device: cuda
    dtype: bf16
    max_seq_len: 4096
    gpu_telemetry: true
    gpu_telemetry_interval: 5
    temperature: 0.0
    top_k: 0
    use_ema: true
    seed: 1234

  # Optional legacy API wrapper, kept for later if W1 is served behind an OpenAI-compatible endpoint.
  - name: w1_api
    backend: openai_compatible
    model: whale-w1
    api_base: http://localhost:8000/v1
    api_key: EMPTY
    timeout: 600
    gpu_telemetry: false
    generation_params:
      top_p: 1.0
    api_param_map:
      w1_sampler: sampler
      w1_steps: steps
    extra_body: {}

defaults:
  sample_limit: null
  sample_indices: null
  num_samples: null
  gen_length: 128
  gen_steps: 128
  gen_blocksize: 128
  max_new_tokens: null
  max_seq_len: 8192
  temperature: 0.0
  cfg: 0.0
  remasking: low_confidence
  mask_id: 5
  token_selection_confidence_threshold: null
  min_transfer_tokens: 1
  diff_confidence_eos_eot_inf: true
  diff_logits_eos_inf: false
  return_trace: false
  trace_token_snapshots: false
  trace_decode_snapshots: false

# ---------------------------------------------------------------------------
# W1-focused path.
# W1's public release is not an iLLaDA-style threshold/block sampler.  It exposes
# diffusion samplers {standard,gidd,jump}, steps, and max_new_tokens.  Therefore
# W1 is evaluated mainly through sampler-step trace + small scoring probes.
# ---------------------------------------------------------------------------
tasks:
  native_w1_trace_focus:
    description: "W1-4B single-sample trace focus: sampler/step parallel generation behavior."
    experiments:
      - name: native_w1_trace_gsm8k_sample7
        benchmark: gsm8k
        models: [w1_4b]
        params:
          sample_indices: [7]
          gen_length: 256
          max_new_tokens: 256
          temperature: 0.0
          return_trace: true
        sweep:
          w1_sampler: [standard, gidd, jump]
          w1_steps: [64, 32, 16]

      - name: native_w1_trace_mbpp_sample6
        benchmark: mbpp
        models: [w1_4b]
        params:
          sample_indices: [6]
          gen_length: 512
          max_new_tokens: 512
          temperature: 0.0
          return_trace: true
        sweep:
          w1_sampler: [standard, gidd, jump]
          w1_steps: [64, 32, 16]

      - name: native_w1_trace_context_order2_sample0
        benchmark: ruler_niah_order_2
        models: [w1_4b]
        params:
          num_samples: 1
          gen_length: 64
          max_new_tokens: 64
          temperature: 0.0
          return_trace: true
        sweep:
          context_length: [2048]
          needle_pair: [front_back]
          w1_sampler: [standard, gidd, jump]
          w1_steps: [64, 32]

  native_w1_score_small:
    description: "Small W1 score sanity check; no trace, low GPU cost."
    experiments:
      - name: native_w1_score_gsm8k_20
        benchmark: gsm8k
        models: [w1_4b]
        params:
          sample_limit: 20
          gen_length: 256
          max_new_tokens: 256
          temperature: 0.0
          return_trace: false
        sweep:
          w1_sampler: [gidd]
          w1_steps: [64, 32, 16]

      - name: native_w1_score_mbpp_10
        benchmark: mbpp
        models: [w1_4b]
        params:
          sample_limit: 10
          gen_length: 512
          max_new_tokens: 512
          temperature: 0.0
          return_trace: false
        sweep:
          w1_sampler: [gidd]
          w1_steps: [64, 32]

      - name: native_w1_score_context_order2_10
        benchmark: ruler_niah_order_2
        models: [w1_4b]
        params:
          num_samples: 10
          gen_length: 64
          max_new_tokens: 64
          temperature: 0.0
          return_trace: false
        sweep:
          context_length: [2048, 4096]
          needle_pair: [front_back]
          w1_sampler: [gidd]
          w1_steps: [64, 32, 16]

  # Quick side-by-side comparison, useful after W1 trace works.
  native_quick_compare:
    description: "One-sample native comparison across core experiment families."
    experiments:
      - name: native_parallel_gsm8k_s7_illada
        benchmark: gsm8k
        models: [illada]
        params:
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 256
          min_transfer_tokens: 1
          return_trace: true
        sweep:
          gen_steps: [256, 64, 32]
          token_selection_confidence_threshold: [null]

      - name: native_parallel_gsm8k_s7_w1
        benchmark: gsm8k
        models: [w1_4b]
        params:
          sample_indices: [7]
          gen_length: 256
          max_new_tokens: 256
          temperature: 0.0
          return_trace: true
        sweep:
          w1_sampler: [standard, gidd, jump]
          w1_steps: [64, 32, 16]

      - name: native_context_order2_smoke_compare
        benchmark: ruler_niah_order_2
        models: [illada, w1_4b]
        params:
          num_samples: 3
          gen_length: 64
          gen_steps: 64
          gen_blocksize: 32
          max_new_tokens: 64
          max_seq_len: 4096
          min_transfer_tokens: 1
          return_trace: false
        sweep:
          context_length: [2048]
          needle_pair: [front_back]

      - name: native_mbpp_s6_compare
        benchmark: mbpp
        models: [illada, w1_4b]
        params:
          sample_indices: [6]
          gen_length: 512
          gen_steps: 512
          gen_blocksize: 16
          max_new_tokens: 512
          min_transfer_tokens: 1
          return_trace: false
        sweep:
          w1_sampler: [gidd]
          w1_steps: [64]

  # Detailed iLLaDA-only ARness trace used by visual_arness_trace.py.
  native_arness:
    description: "iLLaDA detailed ARness trace; W1 trace is handled in native_w1_trace_focus."
    experiments:
      - name: native_arness_trace_gsm8k_sample7
        benchmark: gsm8k
        models: [illada]
        params:
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 64
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [64, 32, 16]
          token_selection_confidence_threshold: [null, 0.6, 0.8]

      - name: native_arness_trace_mbpp_sample6
        benchmark: mbpp
        models: [illada]
        params:
          sample_indices: [6]
          gen_length: 512
          gen_blocksize: 16
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [512, 256, 128]
          token_selection_confidence_threshold: [null, 0.6, 0.8]

  # Fuller context order-2 run for iLLaDA. iLLaDA has 8192-token max sequence.
  native_context_order2_illada:
    description: "Two-needle long-context ordered retrieval for iLLaDA up to 8k."
    experiments:
      - name: native_context_order2_illada_2_4_8k
        benchmark: ruler_niah_order_2
        models: [illada]
        params:
          num_samples: 20
          gen_length: 64
          gen_steps: 64
          gen_blocksize: 32
          max_new_tokens: 64
          max_seq_len: 8192
          min_transfer_tokens: 1
          return_trace: false
        sweep:
          context_length: [2048, 4096, 8192]
          needle_pair: [front_middle, front_back, middle_back]

  # W1 context comparison is limited to 4096 by the W1 public config.
  native_context_order2_w1:
    description: "Two-needle ordered retrieval for W1-4B within its 4096-token limit."
    experiments:
      - name: native_context_order2_w1_2_4k
        benchmark: ruler_niah_order_2
        models: [w1_4b]
        params:
          num_samples: 20
          gen_length: 64
          max_new_tokens: 64
          temperature: 0.0
          return_trace: false
        sweep:
          context_length: [2048, 4096]
          needle_pair: [front_middle, front_back, middle_back]
          w1_sampler: [gidd]
          w1_steps: [64]
