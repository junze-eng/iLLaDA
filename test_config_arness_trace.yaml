run:
  tasks: [arness]

execution:
  output_dir: outputs/arness_trace
  dry_run: false
  stop_on_error: true
  collect_metrics: true
  gpu_telemetry:
    enabled: true
    interval_seconds: 5
  opencompass_args: []

model:
  type: instruct
  path: GSAI-ML/iLLaDA-8B-Instruct
  abbr: illada-8b-instruct
  max_out_len: 512
  max_seq_len: 8192
  batch_size: 1
  batch_size_: 1
  mask_id: 5
  cfg: 0.0
  temperature: 0.0
  remasking: low_confidence
  arness_trace_output: outputs/arness_trace/sample_traces
  model_kwargs:
    device_map: auto
    torch_dtype: torch.bfloat16
  run_cfg:
    num_gpus: 1

runner:
  partitioner:
    num_worker: 1
    num_split: null
    min_task_size: 1
  runner:
    max_num_workers: 1
    retry: 1

defaults:
  sample_limit: null
  sample_indices: null
  gen_length: 256
  gen_steps: 256
  gen_blocksize: 64
  diff_confidence_eos_eot_inf: true
  diff_logits_eos_inf: false
  token_selection_confidence_threshold: null
  min_transfer_tokens: 1
  return_trace: true
  trace_token_snapshots: false
  trace_decode_snapshots: false
  context_prefix_tokens: 0
  context_length: null
  needle_position: null

tasks:
  arness:
    description: "Task 3 trajectory case study: block-level AR restoration + within-block diffusion."
    experiments:
      - name: arness_trace_gsm8k_sample7
        benchmark: gsm8k
        params:
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 64
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [256, 128, 64, 32]
          token_selection_confidence_threshold: [null, 0.8, 0.9]

      - name: arness_trace_mbpp_sample6
        benchmark: mbpp
        params:
          sample_indices: [6]
          gen_length: 512
          gen_blocksize: 128
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [512, 256, 128, 64]
          token_selection_confidence_threshold: [null, 0.8, 0.9]
