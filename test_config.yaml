run:
  tasks: [context]
  execution:
    output_dir: outputs/task2_context_full
    dry_run: false
    stop_on_error: true
    collect_metrics: true
    gpu_telemetry:
      enabled: true
      interval_seconds: 5
    opencompass_args: []
  data:
    ruler_haystack_path: data/ruler/paul_graham_essay.jsonl
    prepared_dir: data/prepared

model:
  type: instruct
  path: GSAI-ML/iLLaDA-8B-Instruct
  abbr: illada-8b-instruct
  max_out_len: 128
  max_seq_len: 8192
  batch_size: 1
  batch_size_: 1
  mask_id: 5
  cfg: 0.0
  temperature: 0.0
  remasking: low_confidence
  model_kwargs:
    device_map: auto
    torch_dtype: torch.bfloat16
  run_cfg:
    num_gpus: 1
  runner:
    partitioner:
      num_worker: 1
      num_split: null
      min_task_size: 16
    runner:
      max_num_workers: 1
      retry: 1

defaults:
  sample_limit: null
  sample_indices: null
  gen_length: 128
  gen_steps: 128
  gen_blocksize: 128
  diff_confidence_eos_eot_inf: true
  diff_logits_eos_inf: false
  token_selection_confidence_threshold: null
  min_transfer_tokens: 1
  return_trace: true
  trace_token_snapshots: false
  trace_decode_snapshots: false
  context_prefix_tokens: 0
  context_length: null
  needle_position: null

tasks:
  context:
    description: "Task 2: pure RULER NIAH single_1 context-length sweep."
    experiments:
      - name: task2_ruler_niah_1_2_4_8k
        benchmark: ruler_niah_single_1
        params:
          decoding_config_name: ar_like
          arness: 1
          sample_limit: null
          num_samples: 20
          gen_length: 128
          gen_steps: 128
          gen_blocksize: 128
          max_seq_len: 8192
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          context_length: [1024, 2048, 4096, 8192]
          needle_position: [front, middle, back]
