run:
  tasks: [context_double]
  experiments: []

execution:
  output_dir: outputs
  dry_run: false
  stop_on_error: true
  collect_metrics: true
  gpu_telemetry:
    enabled: true
    interval_seconds: 5
  opencompass_args: []

data:
  ruler_haystack_path: data/ruler/paul_graham_essay.jsonl
  prepared_dir: data/prepared

model:
  type: instruct
  path: GSAI-ML/iLLaDA-8B-Instruct
  abbr: illada-8b-instruct
  max_out_len: 512
  max_seq_len: 8192
  batch_size: 1
  batch_size_: 1
  mask_id: 5
  cfg: 0.0
  temperature: 0.0
  remasking: low_confidence
  arness_trace_output: outputs/arness_trace/sample_traces
  model_kwargs:
    device_map: auto
    torch_dtype: torch.bfloat16
  run_cfg:
    num_gpus: 1

runner:
  partitioner:
    num_worker: 1
    num_split: null
    min_task_size: 1
  runner:
    max_num_workers: 1
    retry: 1

defaults:
  sample_limit: null
  sample_indices: null
  gen_length: 128
  gen_steps: 128
  gen_blocksize: 128
  diff_confidence_eos_eot_inf: true
  diff_logits_eos_inf: false
  token_selection_confidence_threshold: null
  min_transfer_tokens: 1
  return_trace: true
  trace_token_snapshots: false
  trace_decode_snapshots: false
  context_prefix_tokens: 0
  context_length: null
  needle_position: null

tasks:

  context_double:
    description: "Task 2b: 8K RULER NIAH double-key context retrieval, testing front-middle/front-back/middle-back under 1/2/4 token-per-step decoding."
    output_path: outputs/context_double
    experiments:
      - name: context_double_8k_front_middle
        benchmark: ruler_niah_double
        output_path: outputs/context_double/front_middle
        params:
          decoding_config_name: context_double_8k_front_middle
          arness: 1
          sample_limit: null
          num_samples: 10
          context_length: 8192
          max_seq_len: 8192
          gen_length: 128
          gen_blocksize: 32
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          return_trace: false
          trace_token_snapshots: false
          trace_decode_snapshots: false
          needle_positions: [front, middle]
        sweep:
          gen_steps: [128, 64, 32]

      - name: context_double_8k_front_back
        benchmark: ruler_niah_double
        output_path: outputs/context_double/front_back
        params:
          decoding_config_name: context_double_8k_front_back
          arness: 1
          sample_limit: null
          num_samples: 10
          context_length: 8192
          max_seq_len: 8192
          gen_length: 128
          gen_blocksize: 32
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          return_trace: false
          trace_token_snapshots: false
          trace_decode_snapshots: false
          needle_positions: [front, back]
        sweep:
          gen_steps: [128, 64, 32]

      - name: context_double_8k_middle_back
        benchmark: ruler_niah_double
        output_path: outputs/context_double/middle_back
        params:
          decoding_config_name: context_double_8k_middle_back
          arness: 1
          sample_limit: null
          num_samples: 10
          context_length: 8192
          max_seq_len: 8192
          gen_length: 128
          gen_blocksize: 32
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          return_trace: false
          trace_token_snapshots: false
          trace_decode_snapshots: false
          needle_positions: [middle, back]
        sweep:
          gen_steps: [128, 64, 32]
  parallel:
    description: "Task 1: GSM8K/MBPP parallel token restoration sweep."
    output_path: outputs/parallel
    experiments:
      - name: task1_gsm8k_ar_like
        benchmark: gsm8k
        params:
          decoding_config_name: ar_like
          arness: 1
          sample_limit: 50
          gen_length: 256
          gen_steps: 256
          gen_blocksize: 256
          min_transfer_tokens: 1

      - name: task1_gsm8k_mild_parallel
        benchmark: gsm8k
        params:
          decoding_config_name: mild_parallel
          arness: 4
          sample_limit: 50
          gen_length: 256
          gen_steps: 64
          gen_blocksize: 256
          min_transfer_tokens: 4

      - name: task1_gsm8k_strong_parallel
        benchmark: gsm8k
        params:
          decoding_config_name: strong_parallel
          arness: 8
          sample_limit: 50
          gen_length: 256
          gen_steps: 32
          gen_blocksize: 256
          min_transfer_tokens: 8

      - name: task1_mbpp_ar_like
        benchmark: mbpp
        params:
          decoding_config_name: ar_like
          arness: 1
          sample_limit: 50
          gen_length: 512
          gen_steps: 512
          gen_blocksize: 512
          min_transfer_tokens: 1

      - name: task1_mbpp_mild_parallel
        benchmark: mbpp
        params:
          decoding_config_name: mild_parallel
          arness: 4
          sample_limit: 50
          gen_length: 512
          gen_steps: 128
          gen_blocksize: 512
          min_transfer_tokens: 4

      - name: task1_mbpp_strong_parallel
        benchmark: mbpp
        params:
          decoding_config_name: strong_parallel
          arness: 8
          sample_limit: 50
          gen_length: 512
          gen_steps: 64
          gen_blocksize: 512
          min_transfer_tokens: 8

  context:
    description: "Task 2: pure RULER NIAH single_1 context-length sweep."
    output_path: outputs/context
    experiments:
      - name: task2_ruler_niah_1_2_4_8k
        benchmark: ruler_niah_single_1
        output_path: outputs/context
        params:
          decoding_config_name: ar_like
          arness: 1
          sample_limit: null
          num_samples: 20
          gen_length: 128
          gen_steps: 128
          gen_blocksize: 32
          max_seq_len: 8192
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          context_length: [2048, 4096, 8192]
          needle_position: [front, middle, back]

  arness:
    description: "Task 3: two-sample detailed ARness trace case study."
    output_path: outputs/arness

    experiments:
      - name: arness_trace_gsm8k_sample7
        benchmark: gsm8k
        output_path: outputs/arness/arness_trace_gsm8k_sample7
        params:
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 64
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [64, 32, 16]
          token_selection_confidence_threshold: [null, 0.6, 0.8]

      - name: arness_trace_mbpp_sample6
        benchmark: mbpp
        output_path: outputs/arness/arness_trace_mbpp_sample6
        params:
          sample_indices: [6]
          gen_length: 512
          gen_blocksize: 16
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [512, 256, 128]
          token_selection_confidence_threshold: [null, 0.6, 0.8]

      - name: arness_trace_mbpp_sample6_steps1024
        benchmark: mbpp
        output_path: outputs/arness/arness_trace_mbpp_sample6
        params:
          sample_indices: [6]
          gen_length: 1024
          gen_blocksize: 32
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [1024]
          token_selection_confidence_threshold: [null, 0.6, 0.8]
          
  temp_threshold_study:
    description: "Task 4: temperature x confidence-threshold x steps ablation, to test whether sampling randomness and/or threshold filtering prevent the strong/mild-parallel degenerate collapse (e.g. the sample7 all-'0' collapse)."
    output_path: outputs/temp_threshold_study
    experiments:
      - name: task4_gsm8k_temp_threshold_steps
        benchmark: gsm8k
        params:
          sample_limit: 10
          gen_length: 256
          gen_blocksize: 256
          min_transfer_tokens: 1
          return_trace: true
        sweep:
          gen_steps: [256, 64, 32]
          temperature: [0.0, 0.3]
          token_selection_confidence_threshold: [null, 0.8, 0.9]

      - name: task4_gsm8k_resume_temp03
        benchmark: gsm8k
        params:
          sample_limit: 10
          gen_length: 256
          gen_blocksize: 256
          temperature: 0.3
          min_transfer_tokens: 1
          return_trace: true
        sweep:
          gen_steps: [256, 64, 32]
          token_selection_confidence_threshold: [null, 0.8, 0.9]
  custom_benchmark:
    description: "Task 5: parallel-decoding mechanism study on custom_math (self-authored, paper-clean -- fine to use as headline evaluation evidence). task5_custom_math_ar_like/mild/strong_parallel mirror Task 1's steps-only sweep (block_length held at gen_length). task5_custom_math_block_grid extends this to the block_length=32/8 rows of a full gen_steps x block_length grid (block_length=256 row already covered by the ar_like/mild/strong experiments above) to test whether semi-autoregressive block splitting changes the strong_parallel collapse (see Task 1/Task 3 sample7 case study). task5_custom_math_overprovisioned_steps tests gen_steps > gen_length (2x) crossed with confidence threshold, to isolate whether threshold's completion_rate drop (seen in Task 3/4) is a real filtering effect or just a steps-budget artifact -- see generate.py's get_num_transfer_tokens: when steps > block_length, each masked position gets scheduled exactly once, so the threshold fallback (min_transfer_tokens) becomes unconditional and every position should eventually get force-committed. Mirrored on gsm8k as Task 6 (gsm8k_mechanism) so the two can run on separate GPUs in parallel."
    output_path: outputs/custom_benchmark
    experiments:
      - name: task5_custom_math_ar_like
        benchmark: custom_math
        params:
          decoding_config_name: ar_like
          arness: 1
          sample_limit: null
          gen_length: 256
          gen_steps: 256
          gen_blocksize: 256
          min_transfer_tokens: 1

      - name: task5_custom_math_mild_parallel
        benchmark: custom_math
        params:
          decoding_config_name: mild_parallel
          arness: 4
          sample_limit: null
          gen_length: 256
          gen_steps: 64
          gen_blocksize: 256
          min_transfer_tokens: 4

      - name: task5_custom_math_strong_parallel
        benchmark: custom_math
        params:
          decoding_config_name: strong_parallel
          arness: 8
          sample_limit: null
          gen_length: 256
          gen_steps: 32
          gen_blocksize: 256
          min_transfer_tokens: 8

      - name: task5_custom_math_block_grid
        benchmark: custom_math
        params:
          sample_limit: null
          gen_length: 256
          min_transfer_tokens: 1
        sweep:
          gen_blocksize: [32, 8]
          gen_steps: [256, 64, 32]

      - name: task5_custom_math_overprovisioned_steps
        benchmark: custom_math
        params:
          sample_limit: 10
          gen_length: 256
          gen_blocksize: 256
          temperature: 0.0
          min_transfer_tokens: 1
          return_trace: true
        sweep:
          gen_steps: [512]
          token_selection_confidence_threshold: [null, 0.8, 0.9]

  gsm8k_mechanism:
    description: "Task 6: gsm8k mirror of Task 5's mechanism study (block_length grid + overprovisioned-steps), run as its own task group so it can go on a separate GPU in parallel with Task 5. gsm8k is a paper benchmark, so these results are cross-dataset mechanism confirmation only -- not headline evaluation evidence for the report (that role stays with custom_math / Task 5). task6_gsm8k_block_grid adds the block_length=32/8 rows (block_length=256 row already covered by Task 1's task1_gsm8k_ar_like/mild/strong_parallel). task6_gsm8k_overprovisioned_steps mirrors task5_custom_math_overprovisioned_steps exactly (gen_steps=512=2x gen_length, crossed with threshold, temperature fixed at 0.0)."
    output_path: outputs/gsm8k_mechanism
    experiments:
      - name: task6_gsm8k_block_grid
        benchmark: gsm8k
        params:
          sample_limit: 30
          gen_length: 256
          min_transfer_tokens: 1
        sweep:
          gen_blocksize: [32, 8]
          gen_steps: [256, 64, 32]

      - name: task6_gsm8k_overprovisioned_steps
        benchmark: gsm8k
        params:
          sample_limit: 10
          gen_length: 256
          gen_blocksize: 256
          temperature: 0.0
          min_transfer_tokens: 1
          return_trace: true
        sweep:
          gen_steps: [512]
          token_selection_confidence_threshold: [null, 0.8, 0.9]

  overprovision_rescue:
    description: "Task 7: does simply giving more steps (no schedule tricks, plain min_transfer_tokens=1) rescue the completion_rate collapse already measured at block_length=512, gen_steps=64 (token-per-step=8) on MBPP -- task3_mbpp_threshold_counterfactual_mbpp_7/8, completion_rate 0.24-0.29? Keeps block_length=512 fixed (so scheduled_count-per-step stays >1, unlike the degenerate block=256/steps=512 case in task5/task6_overprovisioned_steps where scheduled_count is always <=1 and threshold structurally cannot cause any backlog). gen_steps=64 is the known-collapsed baseline; 128/256 test whether more steps at the same block_length recovers completion_rate."
    output_path: outputs/overprovision_rescue
    experiments:
      - name: task7_mbpp_overprovision_rescue
        benchmark: mbpp
        params:
          sample_limit: 10
          gen_length: 512
          gen_blocksize: 512
          temperature: 0.0
          min_transfer_tokens: 1
          return_trace: true
        sweep:
          gen_steps: [64, 128, 256]
          token_selection_confidence_threshold: [0.8, 0.9]

  gsm8k_overprovision_rescue:
    description: "Task 8: mirrors Task 7's overprovision-rescue test on gsm8k instead of MBPP. Motivation: MBPP needs full structural completeness (any unresolved masked position tends to break the whole sample -- task7 saw final_mask_count still ~175-326/512 even at gen_steps=128, and 0% pass across all 6 steps x threshold combos regardless of steps). GSM8K only needs the final numeric answer right, so the same threshold+min_transfer_tokens=1 fallback collapse may respond very differently to partial completion than MBPP's all-or-nothing code execution. Keeps block_length=256 fixed (gsm8k's native gen_length, matching task1_gsm8k_ar_like/mild/strong_parallel's block size). gen_steps=32 is the known-collapsed baseline (task1_gsm8k_strong_parallel used min_transfer_tokens=8 with no threshold and still got 22% accuracy; here min_transfer_tokens=1 fallback + real threshold gating is expected to collapse completion_rate at the same step count). 64/128 test whether more steps rescues completion_rate and/or accuracy, same doubling pattern as Task 7 (64->128->256 there, 32->64->128 here since gsm8k's gen_length here is half of MBPP's)."
    output_path: outputs/gsm8k_overprovision_rescue
    experiments:
      - name: task8_gsm8k_overprovision_rescue
        benchmark: gsm8k
        params:
          sample_limit: 10
          gen_length: 256
          gen_blocksize: 256
          temperature: 0.0
          min_transfer_tokens: 1
          return_trace: true
        sweep:
          gen_steps: [32, 64, 128]
          token_selection_confidence_threshold: [0.8, 0.9]

  baseline:
    description: "Paper-anchor baseline for iLLaDA-Instruct. Used as reference line in visualization."
    output_path: outputs/baseline
    experiments:
      - name: paper_baseline_gsm8k_instruct
        benchmark: gsm8k
        params:
          decoding_config_name: paper_anchor_gsm8k_len2048_block32_steps2048
          sample_limit: 50
          gen_length: 2048
          gen_steps: 2048
          gen_blocksize: 32
          max_out_len: 2048
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          remasking: low_confidence
          diff_confidence_eos_eot_inf: true
          diff_logits_eos_inf: false
          return_trace: false
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: paper_baseline_mbpp_instruct
        benchmark: mbpp
        params:
          decoding_config_name: paper_anchor_mbpp_len2048_block16_steps2048
          sample_limit: 50
          gen_length: 2048
          gen_steps: 2048
          gen_blocksize: 16
          max_out_len: 2048
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          remasking: low_confidence
          diff_confidence_eos_eot_inf: true
          diff_logits_eos_inf: false
          return_trace: false
          trace_token_snapshots: false
          trace_decode_snapshots: false

  dynamic_speed_gsm8k:
    description: "Exploratory GSM8K dynamic decoding speed schedule with paper-style block size."
    output_path: outputs/dynamic_speed_gsm8k
    # steps_per_block_schedule stores per-block denoising steps directly:
    # all_1tps: [32, 32, 32, 32, 32, 32, 32, 32]
    # all_2tps: [16, 16, 16, 16, 16, 16, 16, 16]
    # all_4tps: [8, 8, 8, 8, 8, 8, 8, 8]
    # slow_to_fast_1_2_4: [32, 32, 16, 16, 16, 8, 8, 8]
    # fast_to_slow_4_2_1: [8, 8, 8, 16, 16, 16, 32, 32]
    experiments:
      - name: dynspeed_gsm8k_sample7_block32_all_1tps
        benchmark: gsm8k
        params:
          speed_schedule_label: all_1tps
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 32
          steps_per_block_schedule: [32, 32, 32, 32, 32, 32, 32, 32]
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: dynspeed_gsm8k_sample7_block32_all_2tps
        benchmark: gsm8k
        params:
          speed_schedule_label: all_2tps
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 32
          steps_per_block_schedule: [16, 16, 16, 16, 16, 16, 16, 16]
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: dynspeed_gsm8k_sample7_block32_all_4tps
        benchmark: gsm8k
        params:
          speed_schedule_label: all_4tps
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 32
          steps_per_block_schedule: [8, 8, 8, 8, 8, 8, 8, 8]
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: dynspeed_gsm8k_sample7_block32_slow_to_fast_1_2_4
        benchmark: gsm8k
        params:
          speed_schedule_label: slow_to_fast_1_2_4
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 32
          steps_per_block_schedule: [32, 32, 16, 16, 16, 8, 8, 8]
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: dynspeed_gsm8k_sample7_block32_fast_to_slow_4_2_1
        benchmark: gsm8k
        params:
          speed_schedule_label: fast_to_slow_4_2_1
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 32
          steps_per_block_schedule: [8, 8, 8, 16, 16, 16, 32, 32]
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: dynspeed_gsm8k_sample7_block32_slow_fast_slow_1_4_1
        benchmark: gsm8k
        params:
          speed_schedule_label: slow_fast_slow_1_4_1
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 32
          steps_per_block_schedule: [32, 32, 8, 8, 8, 8, 32, 32]
          min_transfer_tokens: 1
          token_selection_confidence_threshold: null
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

  dynamic_threshold_gsm8k:
    description: "Exploratory GSM8K per-block confidence-threshold schedule study."
    output_path: outputs/dynamic_threshold_gsm8k
    experiments:
      - name: dynthr_gsm8k_sample7_13_21_34_55_steps128_static_mid
        benchmark: gsm8k
        params:
          sample_indices: [7, 13, 21, 34, 55]
          gen_length: 256
          gen_blocksize: 32
          gen_steps: 128
          threshold_schedule_label: static_mid
          token_selection_confidence_threshold_schedule: [0.6, 0.6, 0.6, 0.6, 0.6, 0.6, 0.6, 0.6]
          token_selection_confidence_threshold: null
          min_transfer_tokens: 1
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: dynthr_gsm8k_sample7_13_21_34_55_steps128_high_to_low
        benchmark: gsm8k
        params:
          sample_indices: [7, 13, 21, 34, 55]
          gen_length: 256
          gen_blocksize: 32
          gen_steps: 128
          threshold_schedule_label: high_to_low
          token_selection_confidence_threshold_schedule: [0.8, 0.8, 0.6, 0.6, 0.6, 0.6, null, null]
          token_selection_confidence_threshold: null
          min_transfer_tokens: 1
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: dynthr_gsm8k_sample7_13_21_34_55_steps64_static_mid
        benchmark: gsm8k
        params:
          sample_indices: [7, 13, 21, 34, 55]
          gen_length: 256
          gen_blocksize: 32
          gen_steps: 64
          threshold_schedule_label: static_mid
          token_selection_confidence_threshold_schedule: [0.6, 0.6, 0.6, 0.6, 0.6, 0.6, 0.6, 0.6]
          token_selection_confidence_threshold: null
          min_transfer_tokens: 1
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: dynthr_gsm8k_sample7_13_21_34_55_steps64_high_to_low
        benchmark: gsm8k
        params:
          sample_indices: [7, 13, 21, 34, 55]
          gen_length: 256
          gen_blocksize: 32
          gen_steps: 64
          threshold_schedule_label: high_to_low
          token_selection_confidence_threshold_schedule: [0.8, 0.8, 0.6, 0.6, 0.6, 0.6, null, null]
          token_selection_confidence_threshold: null
          min_transfer_tokens: 1
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

  step0_confidence_probe:
    description: "Cheap ARness probe: record the model's confidence for every generation-region position (not just committed ones) at the very first diffusion step, to see how initial confidence decays with distance from the prompt. Same 5 samples as dynamic_threshold_gsm8k for consistency. Single block (block_length=gen_length) so step 0 covers the whole generation region."
    output_path: outputs/step0_confidence_probe
    experiments:
      - name: step0_confidence_gsm8k_sample7_13_21_34_55
        benchmark: gsm8k
        params:
          sample_indices: [7, 13, 21, 34, 55]
          gen_length: 256
          gen_blocksize: 256
          gen_steps: 256
          token_selection_confidence_threshold: null
          min_transfer_tokens: 1
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_step0_full_confidence: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

  decode_order_probe:
    description: "Does iLLaDA's free (confidence-based) decoding order carry real value over a forced order? Compares accuracy at matched gen_length/steps across three decode_order settings: 'confidence' (current default -- pick highest-confidence masked positions each step), 'left_to_right' (force the leftmost masked positions, ignoring confidence), 'random' (force a random subset). If confidence ~= left_to_right >> random, iLLaDA's capability is essentially autoregressive under the hood and the parallel/free-order aspect of diffusion decoding is not doing much work. If confidence is clearly better than left_to_right, the free ordering has real value. GSM8K, n=20, steps=gen_length=256 (ar_like pace, block_length=256) so the only variable is which positions get committed each step, not how many."
    output_path: outputs/decode_order_probe
    experiments:
      - name: decode_order_gsm8k_confidence
        benchmark: gsm8k
        params:
          sample_limit: 20
          gen_length: 256
          gen_steps: 256
          gen_blocksize: 256
          decode_order: confidence
          token_selection_confidence_threshold: null
          min_transfer_tokens: 1
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: decode_order_gsm8k_left_to_right
        benchmark: gsm8k
        params:
          sample_limit: 20
          gen_length: 256
          gen_steps: 256
          gen_blocksize: 256
          decode_order: left_to_right
          token_selection_confidence_threshold: null
          min_transfer_tokens: 1
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false

      - name: decode_order_gsm8k_random
        benchmark: gsm8k
        params:
          sample_limit: 20
          gen_length: 256
          gen_steps: 256
          gen_blocksize: 256
          decode_order: random
          token_selection_confidence_threshold: null
          min_transfer_tokens: 1
          temperature: 0.0
          cfg: 0.0
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
