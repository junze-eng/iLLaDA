run:
  tasks: [arness]
  experiments: []

execution:
  output_dir: outputs/arness_trace
  dry_run: false
  stop_on_error: true
  collect_metrics: true
  gpu_telemetry:
    enabled: true
    interval_seconds: 5
  opencompass_args: []

data:
  ruler_haystack_path: data/ruler/paul_graham_essay.jsonl
  prepared_dir: data/prepared

model:
  type: instruct
  path: GSAI-ML/iLLaDA-8B-Instruct
  abbr: illada-8b-instruct
  max_out_len: 512
  max_seq_len: 8192
  batch_size: 1
  batch_size_: 1
  mask_id: 5
  cfg: 0.0
  temperature: 0.0
  remasking: low_confidence
  arness_trace_output: outputs/arness_trace/sample_traces
  model_kwargs:
    device_map: auto
    torch_dtype: torch.bfloat16
  run_cfg:
    num_gpus: 1

runner:
  partitioner:
    num_worker: 1
    num_split: null
    min_task_size: 1
  runner:
    max_num_workers: 1
    retry: 1

defaults:
  sample_limit: null
  sample_indices: null
  gen_length: 128
  gen_steps: 128
  gen_blocksize: 128
  diff_confidence_eos_eot_inf: true
  diff_logits_eos_inf: false
  token_selection_confidence_threshold: null
  min_transfer_tokens: 1
  return_trace: true
  trace_token_snapshots: false
  trace_decode_snapshots: false
  context_prefix_tokens: 0
  context_length: null
  needle_position: null

tasks:
  parallel:
    description: "Task 1: GSM8K/MBPP parallel token restoration sweep."
    experiments:
      - name: task1_gsm8k_ar_like
        benchmark: gsm8k
        params:
          decoding_config_name: ar_like
          arness: 1
          sample_limit: 50
          gen_length: 256
          gen_steps: 256
          gen_blocksize: 256
          min_transfer_tokens: 1

      - name: task1_gsm8k_mild_parallel
        benchmark: gsm8k
        params:
          decoding_config_name: mild_parallel
          arness: 4
          sample_limit: 50
          gen_length: 256
          gen_steps: 64
          gen_blocksize: 256
          min_transfer_tokens: 4

      - name: task1_gsm8k_strong_parallel
        benchmark: gsm8k
        params:
          decoding_config_name: strong_parallel
          arness: 8
          sample_limit: 50
          gen_length: 256
          gen_steps: 32
          gen_blocksize: 256
          min_transfer_tokens: 8

      - name: task1_mbpp_ar_like
        benchmark: mbpp
        params:
          decoding_config_name: ar_like
          arness: 1
          sample_limit: 50
          gen_length: 512
          gen_steps: 512
          gen_blocksize: 512
          min_transfer_tokens: 1

      - name: task1_mbpp_mild_parallel
        benchmark: mbpp
        params:
          decoding_config_name: mild_parallel
          arness: 4
          sample_limit: 50
          gen_length: 512
          gen_steps: 128
          gen_blocksize: 512
          min_transfer_tokens: 4

      - name: task1_mbpp_strong_parallel
        benchmark: mbpp
        params:
          decoding_config_name: strong_parallel
          arness: 8
          sample_limit: 50
          gen_length: 512
          gen_steps: 64
          gen_blocksize: 512
          min_transfer_tokens: 8

  context:
    description: "Task 2: pure RULER NIAH single_1 context-length sweep."
    experiments:
      - name: task2_ruler_niah_1_2_4_8k
        benchmark: ruler_niah_single_1
        params:
          decoding_config_name: ar_like
          arness: 1
          sample_limit: null
          num_samples: 20
          gen_length: 128
          gen_steps: 128
          gen_blocksize: 128
          max_seq_len: 8192
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          context_length: [1024, 2048, 4096, 8192]
          needle_position: [front, middle, back]

  arness:
    description: "Task 3: two-sample detailed ARness trace case study."
    experiments:
      - name: arness_trace_gsm8k_sample7
        benchmark: gsm8k
        params:
          sample_indices: [7]
          gen_length: 256
          gen_blocksize: 64
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [256, 128, 64, 32, 16]
          token_selection_confidence_threshold: [null, 0.6, 0.7, 0.8, 0.9]

      - name: arness_trace_mbpp_sample6
        benchmark: mbpp
        params:
          sample_indices: [6]
          gen_length: 512
          gen_blocksize: 128
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [512, 256, 128, 64, 32, 16]
          token_selection_confidence_threshold: [null, 0.6, 0.7, 0.8, 0.9]

  temp_threshold_study:
    description: "Task 4: temperature x confidence-threshold x steps ablation, to test whether sampling randomness and/or threshold filtering prevent the strong/mild-parallel degenerate collapse (e.g. the sample7 all-'0' collapse)."
    experiments:
      - name: task4_gsm8k_temp_threshold_steps
        benchmark: gsm8k
        params:
          sample_limit: 10
          gen_length: 256
          gen_blocksize: 256
          min_transfer_tokens: 1
          return_trace: true
        sweep:
          gen_steps: [64, 32]
          temperature: [0.0, 0.3, 0.7]
          token_selection_confidence_threshold: [null, 0.7, 0.8, 0.9]
