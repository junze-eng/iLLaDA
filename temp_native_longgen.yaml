run:
  tasks: [native_longgen_mbpp_s6]

execution:
  gpu_telemetry:
    enabled: true
    interval_seconds: 5

data:
  prepared_dir: data/prepared
  ruler_haystack_path: data/ruler/paul_graham_essay.jsonl

model:
  name: iLLaDA
  backend: illada
  type: instruct
  abbr: iLLaDA
  path: GSAI-ML/iLLaDA-8B-Instruct
  mask_id: 5
  apply_chat_template: true
  model_kwargs:
    device_map: auto
    torch_dtype: torch.bfloat16

defaults:
  sample_limit: null
  sample_indices: null
  num_samples: null
  gen_length: 1024
  gen_steps: 1024
  gen_blocksize: 32
  max_seq_len: 8192
  temperature: 0.0
  cfg: 0.0
  remasking: low_confidence
  token_selection_confidence_threshold: null
  min_transfer_tokens: 1
  diff_confidence_eos_eot_inf: true
  diff_logits_eos_inf: false
  return_trace: true
  trace_token_snapshots: false
  trace_decode_snapshots: false

tasks:
  native_longgen_mbpp_s6:
    description: "iLLaDA native long generation MBPP sample 6."
    experiments:
      - name: native_longgen_mbpp_sample6_len1024
        benchmark: mbpp
        params:
          sample_indices: [6]
          gen_length: 1024
          gen_blocksize: 32
          min_transfer_tokens: 1
          return_trace: true
          trace_token_snapshots: false
          trace_decode_snapshots: false
        sweep:
          gen_steps: [1024, 512, 256]
          token_selection_confidence_threshold: [null, 0.6, 0.8]